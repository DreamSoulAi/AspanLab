name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'trustcontrol/scripts/windows/monitor.py'
      - 'trustcontrol/requirements-monitor-py38.txt'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:

jobs:
  build:
    # windows-2019 раннеры GitHub вывел из эксплуатации (2025) — джоба висла
    # в очереди без исполнителя 24ч и авто-отменялась. windows-2022 актуален.
    runs-on: windows-2022
    # Нужно для публикации готового .exe как Release (прямая ссылка для скачивания).
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.7'

      - name: Install dependencies
        run: |
          pip install "pyinstaller>=5.13,<6.0"
          pip install -r trustcontrol/requirements-monitor-py37.txt
          REM webrtcvad-wheels даёт модуль webrtcvad, но имя дистрибутива —
          REM 'webrtcvad-wheels'. PyInstaller-хук делает copy_metadata('webrtcvad')
          REM и падает DistributionNotFound. На windows-раннере есть MSVC,
          REM поэтому ставим компилируемый webrtcvad — имя дистрибутива совпадает
          REM с тем, что ищет хук, и сборка проходит.
          pip uninstall -y webrtcvad-wheels
          pip install --no-cache-dir webrtcvad
        shell: cmd

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --name TrustControl
          --collect-all pyaudio
          --hidden-import=webrtcvad
          --hidden-import=noisereduce
          --hidden-import=scipy
          --hidden-import=scipy.signal
          --hidden-import=scipy.signal.windows
          --hidden-import=scipy.fft
          --hidden-import=requests
          --hidden-import=certifi
          --hidden-import=charset_normalizer
          --distpath dist
          trustcontrol/scripts/windows/monitor.py
        shell: cmd

      - name: Package ZIP
        shell: powershell
        run: |
          Copy-Item "trustcontrol\scripts\windows\config.ini" "dist\config.ini"

          $readme = @"
          ╔══════════════════════════════════════════════════╗
            TrustControl — Мониторинг качества сервиса
          ╚══════════════════════════════════════════════════╝

          ШАГ 1.  Откройте config.ini в Блокноте.
                  Замените  ВСТАВЬ_СЮДА_API_КЛЮЧ  на ключ
                  из личного кабинета (Точки → кнопка ⧉).
                  Файл → Сохранить → закрыть.

          ШАГ 2.  Запустите TrustControl.exe
                  Окно не закрывайте.

          ──────────────────────────────────────────────────
          АВТОЗАПУСК при включении ПК:
            Правой кнопкой на TrustControl.exe
            → Создать ярлык
            → Скопировать ярлык в папку:
            C:\Users\<ВашеИмя>\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup
          "@
          $readme | Out-File -FilePath "dist\README.txt" -Encoding utf8

          Compress-Archive -Path "dist\TrustControl.exe","dist\config.ini","dist\README.txt" -DestinationPath "TrustControl_Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustControl-Windows
          path: TrustControl_Windows.zip
          retention-days: 90

      # Публикуем готовый .exe как Release под постоянным тегом windows-latest,
      # чтобы клиент качал по одной неизменной ссылке без захода в Actions:
      #   .../releases/latest  →  TrustControl_Windows.zip
      - name: Publish Release (прямая ссылка для скачивания)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete windows-latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create windows-latest TrustControl_Windows.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "TrustControl для Windows — последняя сборка" \
            --notes "Скачайте TrustControl_Windows.zip, распакуйте, вставьте API-ключ из личного кабинета в config.ini и запустите TrustControl.exe. Устанавливать Python и что-либо ещё НЕ нужно — всё внутри одного файла."
