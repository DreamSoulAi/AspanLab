name: Build Windows Monitor .exe

on:
  push:
    branches: [main]
    paths:
      - 'scripts/windows/monitor.py'
      - 'scripts/windows/requirements-monitor.txt'
      - '.github/workflows/build-monitor-exe.yml'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: powershell
        working-directory: scripts/windows
        run: |
          python -m pip install --upgrade pip
          pip install pipwin
          pipwin install pyaudio
          pip install -r requirements-monitor.txt
          pip install pyinstaller==6.10.0

      - name: Build single-file .exe
        shell: powershell
        working-directory: scripts/windows
        run: |
          pyinstaller `
            --onefile `
            --name TrustControl-Monitor `
            --icon NONE `
            --console `
            --collect-binaries webrtcvad `
            --collect-data noisereduce `
            --hidden-import=numpy `
            --hidden-import=pyaudio `
            --hidden-import=webrtcvad `
            --hidden-import=noisereduce `
            --hidden-import=requests `
            monitor.py

      - name: Verify .exe was built
        shell: powershell
        working-directory: scripts/windows
        run: |
          if (-not (Test-Path "dist\TrustControl-Monitor.exe")) {
            Write-Error "Build failed: .exe not found"
            exit 1
          }
          $size = (Get-Item "dist\TrustControl-Monitor.exe").Length / 1MB
          Write-Host ".exe built: $([math]::Round($size,1)) MB"

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustControl-Monitor
          path: scripts/windows/dist/TrustControl-Monitor.exe
          retention-days: 90

      - name: Create GitHub Release (on main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: monitor-${{ github.run_number }}
          name: Monitor build ${{ github.run_number }}
          files: scripts/windows/dist/TrustControl-Monitor.exe
          generate_release_notes: false
          body: |
            Automated build of TrustControl Monitor.

            Usage:
              TrustControl-Monitor.exe --api-url https://aspanlab.onrender.com --api-key YOUR_KEY

            See README for full options.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
