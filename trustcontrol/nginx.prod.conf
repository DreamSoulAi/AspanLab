# ════════════════════════════════════════════════════════════
#  TrustControl — Nginx ПРОД (VPS ps.kz, домен trustcontrol.kz)
#
#  Роль: SSL-терминатор + reverse proxy. Само FastAPI-приложение
#  отдаёт и фронт (/ → дашборд, /mic → PWA), и API (/api/...),
#  поэтому nginx проксирует ВСЁ на api:8000 (как делал Render).
#
#  Сертификат: Let's Encrypt, выпускается на ХОСТЕ (certbot standalone),
#  монтируется в контейнер из /etc/letsencrypt. Renew — webroot
#  /var/www/certbot (см. scripts/deploy-backend.sh и крон).
# ════════════════════════════════════════════════════════════

# Rate limiting (вторая линия — в приложении тоже есть свой лимитер)
limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=8r/m;

upstream trustcontrol_api {
    server api:8000;
    keepalive 32;
}

# Общие proxy-заголовки (повторяем в каждом location)
# Host/IP/Proto — чтобы приложение знало реальный домен и https.

# ── HTTP :80 — ACME challenge + редирект на HTTPS ────────────
server {
    listen 80;
    listen [::]:80;
    server_name trustcontrol.kz www.trustcontrol.kz;

    # Let's Encrypt продление сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — основной сервер ─────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name trustcontrol.kz www.trustcontrol.kz;

    ssl_certificate     /etc/letsencrypt/live/trustcontrol.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trustcontrol.kz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security заголовки
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Аудио-файлы с кассы (лимит приложения 10MB, даём запас)
    client_max_body_size 15M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Авторизация — строгий лимит ──────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://trustcontrol_api;
    }

    # ── Приём аудио — длинный таймаут (STT + GPT думают) ─────
    location /api/reports/submit {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://trustcontrol_api;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ── Всё остальное (API + фронт + /mic) → приложение ──────
    location / {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://trustcontrol_api;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://trustcontrol_api;
        access_log off;
    }
}
