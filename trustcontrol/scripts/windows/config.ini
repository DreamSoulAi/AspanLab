[settings]
; Адрес сервера — не менять
API_URL=https://aspanlab-1.onrender.com

; API-ключ этой кассы — скопировать из личного кабинета (Точки → API Ключ)
API_KEY=ВСТАВЬ_СЮДА_API_КЛЮЧ

; Язык: ru = русский, kk = казахский, auto = автоопределение
LANGUAGE=auto

; Секунд тишины = конец разговора (2.5 по умолчанию)
SILENCE=2.5

; Чувствительность микрофона 0-3 (2 по умолчанию)
VAD_LEVEL=2
