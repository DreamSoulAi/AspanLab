# ════════════════════════════════════════════════════════════
#  TrustControl — Nginx конфиг
#  - Проксирует API запросы на FastAPI
#  - Отдаёт статичный фронтенд
#  - SSL через Let's Encrypt
#  - Gzip сжатие
#  - Rate limiting
# ════════════════════════════════════════════════════════════

# Rate limiting зоны
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upstream — FastAPI сервер
upstream trustcontrol_api {
    server api:8000;
    keepalive 32;
}

# ── HTTP → HTTPS редирект ────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS сервер ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL настройки (современные)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security заголовки
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Максимальный размер загрузки (аудио файлы)
    client_max_body_size 15M;

    # ── API endpoints ────────────────────────────────────────

    # Авторизация — строгий rate limit
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://trustcontrol_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Загрузка аудио — увеличенный таймаут
    location /api/reports/submit {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://trustcontrol_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;   # Whisper может долго думать
        proxy_send_timeout 60s;
    }

    # Все остальные API
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://trustcontrol_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Health check (без rate limit)
    location /health {
        proxy_pass http://trustcontrol_api;
        access_log off;
    }

    # ── Фронтенд (статика) ───────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA routing

        # Кеширование статики
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
