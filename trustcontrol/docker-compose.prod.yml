# ════════════════════════════════════════════════════════════
#  TrustControl — ПРОД на собственном VPS (ps.kz, Алматы)
#
#  Поднимает БЭКЕНД (FastAPI) + PostgreSQL + nginx с SSL под trustcontrol.kz.
#  БД — локальный PostgreSQL (postgres:5432), данные в volume postgres_data.
#  DATABASE_URL в .env.prod: postgresql+asyncpg://trustcontrol:***@postgres:5432/trustcontrol?sslmode=disable
#  ISSAI-воркер живёт в своём docker-compose.issai.yml на том же VPS.
#
#  Запуск:   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#  Логи:     docker compose -f docker-compose.prod.yml logs -f api
#  Обновить: bash scripts/deploy-backend.sh
#
#  ⚠️ ПАМЯТЬ: VPS 4GB. ISSAI уже ест ~2.5-3.5GB. Лимит api=1.2G + swap
#  не дают задушить ISSAI. Если api начнёт OOM-иться — вынести API на
#  отдельную коробку или поднять RAM на VPS.
# ════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── PostgreSQL — локальная база данных ────────────────────
  postgres:
    image: postgres:17
    container_name: trustcontrol_postgres
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustcontrol"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Основной API сервер (FastAPI/uvicorn) ─────────────────
  api:
    build: .
    container_name: trustcontrol_api
    restart: always
    # Наружу НЕ публикуем 8000 — ходит только nginx внутри сети.
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - PORT=8000
      - DEBUG=false
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1200M     # защита ISSAI: api не съест всю RAM
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx — статика фронта + прокси API + SSL ─────────────
  nginx:
    image: nginx:alpine
    container_name: trustcontrol_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro        # сертификаты (host certbot)
      - ./certbot-www:/var/www/certbot              # acme-challenge для renew
    depends_on:
      - api

volumes:
  postgres_data:
