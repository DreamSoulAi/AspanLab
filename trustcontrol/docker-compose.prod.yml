# ════════════════════════════════════════════════════════════
#  TrustControl — ПРОД на собственном VPS (ps.kz, Алматы)
#
#  Поднимает БЭКЕНД (FastAPI) + nginx с SSL под trustcontrol.kz.
#  БД остаётся на Neon (DATABASE_URL в .env.prod) — данные уже там,
#  free-тариф, автобэкап. Локальный Postgres НЕ поднимаем.
#  ISSAI-воркер живёт в своём docker-compose.issai.yml на том же VPS.
#
#  Запуск:   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#  Логи:     docker compose -f docker-compose.prod.yml logs -f api
#  Обновить: bash scripts/deploy-backend.sh
#
#  ⚠️ ПАМЯТЬ: VPS 4GB. ISSAI уже ест ~2.5-3.5GB. Лимит api=1.2G + swap
#  не дают задушить ISSAI. Если api начнёт OOM-иться — вынести API на
#  отдельную коробку или поднять RAM на VPS.
# ════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Основной API сервер (FastAPI/uvicorn) ─────────────────
  api:
    build: .
    container_name: trustcontrol_api
    restart: always
    # Наружу НЕ публикуем 8000 — ходит только nginx внутри сети.
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - PORT=8000
      - DEBUG=false
    volumes:
      - ./uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1200M     # защита ISSAI: api не съест всю RAM
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx — статика фронта + прокси API + SSL ─────────────
  nginx:
    image: nginx:alpine
    container_name: trustcontrol_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro        # сертификаты (host certbot)
      - ./certbot-www:/var/www/certbot              # acme-challenge для renew
    depends_on:
      - api
